################
### MONITORS ###
################
# Run `hyprctl monitors` to get exact names, then adjust below.
# Format: monitor = NAME, RESOLUTION, POSITION, SCALE
monitor = eDP-1, disable                    # Laptop screen permanently off (broken lid)
monitor = ,      2560x1440, 1920x0,    1   # Any other connected monitor (Dell)


###################
### MY PROGRAMS ###
###################
$terminal    = kitty
$fileManager = nautilus
$menu        = rofi -show drun -show-icons


#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = dunst
exec-once = swaybg -m fill -c 1e1e2e
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = sleep 1 && /usr/lib/xdg-desktop-portal-hyprland


#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1


#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in  = 1
    gaps_out = 0

    border_size = 0

    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing    = false

    layout = dwindle
}

decoration {
    rounding       = 0
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled      = true
        range        = 8
        render_power = 3
        color        = rgba(1a1a1acc)
    }

    blur {
        enabled   = true
        size      = 6
        passes    = 2
        vibrancy  = 0.17
        new_optimizations = true
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1,  5.4, easeOutQuint
    animation = windows,       1,  4.8, easeOutQuint
    animation = windowsIn,     1,  4.1, easeOutQuint, popin 87%
    animation = windowsOut,    1,  1.5, linear,       popin 87%
    animation = fadeIn,        1,  1.7, almostLinear
    animation = fadeOut,       1,  1.5, almostLinear
    animation = fade,          1,  3,   quick
    animation = layers,        1,  3.8, easeOutQuint
    animation = layersIn,      1,  4,   easeOutQuint, fade
    animation = layersOut,     1,  1.5, linear,       fade
    animation = fadeLayersIn,  1,  1.8, almostLinear
    animation = fadeLayersOut, 1,  1.4, almostLinear
    animation = workspaces,    1,  1.9, almostLinear, fade
    animation = workspacesIn,  1,  1.2, almostLinear, fade
    animation = workspacesOut, 1,  1.9, almostLinear, fade
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    vfr                     = true   # Variable frame rate — saves power on Intel iGPU
}


#############
### INPUT ###
#############
input {
    kb_layout = us

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        drag_lock         = true
        disable_while_typing = true
    }
}

# gestures {
#     workspace_swipe            = true
#     workspace_swipe_fingers    = 3
#     workspace_swipe_cancel_ratio = 0.15
# }
#
device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# ── App launchers (macOS Cmd-style) ──────────────────────────────────────────
bind = $mainMod,       Space,  exec, $menu               # Cmd+Space  → Spotlight
bind = $mainMod,       Return, exec, $terminal            # Cmd+Enter  → Terminal
bind = $mainMod,       Q,      killactive                 # Cmd+Q      → Quit
bind = $mainMod,       E,      exec, $fileManager         # Cmd+E      → Files
bind = $mainMod,       V,      togglefloating             # Float toggle
bind = $mainMod,       F,      fullscreen, 1              # Maximize
bind = $mainMod SHIFT, F,      fullscreen, 0              # True fullscreen


# ── Window switcher ───────────────────────────────────────────────────────────
bind = ALT, Tab,       exec, rofi -show window
bind = $mainMod, Tab,  exec, rofi -show window

# ── Focus movement ────────────────────────────────────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ── Move windows in tiling layout ────────────────────────────────────────────
bind = $mainMod SHIFT, left,  swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up,    swapwindow, u
bind = $mainMod SHIFT, down,  swapwindow, d

# ── Workspace switching ───────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = , Print,       exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print,  exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# ── Move/resize with mouse ────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Media & system keys ──────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Suppress maximize requests
windowrule {
    name      = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix XWayland drag issues
windowrule {
    name             = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus = true
}

# Float utility windows
windowrule {
    name        = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = true
    center = true
    size  = 800 500
}

windowrule {
    name        = float-blueman
    match:class = ^(blueman-manager)$
    float  = true
    center = true
    size   = 700 500
}

windowrule {
    name        = float-nm
    match:class = ^(nm-connection-editor)$
    float  = true
    center = true
}

# Brave Picture-in-Picture
windowrule {
    name        = pip-brave
    match:title = ^(Picture in picture)$
    float       = true
    pin         = true
    size        = 480 270
    move        = 100%-490 100%-280
}

# Pomerium desktop
windowrule {
    name        = float-pomerium
    match:class = ^(pomerium-desktop-gateways)$
    float  = true
    center = true
}

# Hyprland-run helper
windowrule {
    name       = move-hyprland-run
    match:class = hyprland-run
    move  = 20 monitor_h-120
    float = true
}
