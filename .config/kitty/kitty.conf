# kitty config
# Docs: https://sw.kovidgoyal.net/kitty/conf/

# ── Font ─────────────────────────────────────────────────────────────────────
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        14.0

# ── Cursor ───────────────────────────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0

# ── Scrollback ───────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Window ───────────────────────────────────────────────────────────────────
window_padding_width    8
hide_window_decorations yes
confirm_os_window_close 0

# ── Tabs ─────────────────────────────────────────────────────────────────────
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}: {title}"
tab_bar_min_tabs      1

# ── Layouts ──────────────────────────────────────────────────────────────────
# Cycle through with Ctrl+Shift+L
enabled_layouts tall, fat, grid, horizontal, vertical, stack

# ── Colors (Catppuccin Mocha) ─────────────────────────────────────────────────
foreground            #cdd6f4
background            #1e1e2e
background_opacity    0.92

selection_foreground  #1e1e2e
selection_background  #f5c2e7

cursor            #f5e0dc
cursor_text_color #1e1e2e

url_color #89b4fa

color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de

color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244

# ── Keyboard shortcuts ───────────────────────────────────────────────────────
clear_all_shortcuts no

# Panes — split
map ctrl+shift+enter    new_window
map ctrl+shift+x        close_window

# Panes — navigate
map ctrl+shift+h        neighboring_window left
map ctrl+shift+l        neighboring_window right
map ctrl+shift+k        neighboring_window up
map ctrl+shift+j        neighboring_window down

# Panes — resize
map alt+left            resize_window narrower
map alt+right           resize_window wider
map alt+up              resize_window taller
map alt+down            resize_window shorter

# Layouts
map ctrl+shift+space    next_layout

# Tabs
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+tab            next_tab
map ctrl+shift+tab      previous_tab
map ctrl+alt+1          goto_tab 1
map ctrl+alt+2          goto_tab 2
map ctrl+alt+3          goto_tab 3
map ctrl+alt+4          goto_tab 4
map ctrl+alt+5          goto_tab 5

# ── Broadcast ────────────────────────────────────────────────────────────────
# Broadcasts input to all panes in the current OS window.
# Press Ctrl+Shift+B again (or Escape) to stop broadcasting.
map ctrl+shift+b        kitten broadcast

# ── Scrollback ───────────────────────────────────────────────────────────────
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end

# Copy/paste
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Font size
map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
